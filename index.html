  .nav-logo img { height: 44px; width: auto; display: block; /* ← adjust this number to resize the logo */ }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim); text-decoration: none;
    cursor: pointer; transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }
  .nav-reel {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim); border: 1px solid var(--border);
    padding: 7px 16px; cursor: pointer; transition: all 0.2s;
    text-decoration: none; flex-shrink: 0;
  }
  .nav-reel:hover { color: var(--gold); border-color: var(--gdim); }
  .nav-hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 4px; flex-shrink: 0;
  }
  .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--dim); transition: all 0.3s; }

  /* Mobile drawer */
  .nav-links.open {
    display: flex !important; flex-direction: column;
    position: fixed; top: 70px; left: 0; right: 0;
    background: rgba(10,9,6,0.98); padding: 28px 32px 36px;
    gap: 24px; border-bottom: 1px solid var(--border); z-index: 999;
  }
  .nav-links.open a { font-size: 15px; letter-spacing: 0.25em; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* HERO */
  .hero {
    position: relative; height: 100vh;
    display: flex; align-items: center; overflow: hidden;
  }
  .hero-visual { position: absolute; inset: 0; overflow: hidden; }
  .hero-visual img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75); }
  .hero-fallback {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at 70% 50%, #3d2510, #1a0e06 40%, #0a0906);
  }
  .hero-fallback::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 72% 58%, rgba(180,100,30,0.2) 0%, transparent 45%),
                radial-gradient(circle at 68% 40%, rgba(220,140,40,0.1) 0%, transparent 30%);
  }
  .hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, rgba(10,9,6,0.65) 35%, rgba(10,9,6,0.05) 100%),
                linear-gradient(to bottom, rgba(10,9,6,0.05) 0%, rgba(10,9,6,0.55) 100%);
  }
  .hero-content { position: relative; z-index: 2; padding: 0 80px; max-width: 640px; }
  .hero-eyebrow {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 24px;
    opacity: 0; animation: su 0.8s 0.3s forwards;
  }
  .hero-title {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(42px, 6vw, 72px);
    font-weight: 300; line-height: 1.1; letter-spacing: 0.02em; color: var(--white);
    margin-bottom: 20px; opacity: 0; animation: su 0.8s 0.5s forwards;
  }
  .hero-sub {
    font-size: 19px; font-weight: 300; font-style: italic; color: var(--dim);
    margin-bottom: 44px; opacity: 0; animation: su 0.8s 0.7s forwards;
  }
  .hero-cta {
    display: inline-block; font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--white);
    border: 1px solid rgba(255,255,255,0.3); padding: 14px 32px;
    cursor: pointer; text-decoration: none; transition: all 0.3s;
    opacity: 0; animation: su 0.8s 0.9s forwards;
  }
  .hero-cta:hover { background: var(--gold); border-color: var(--gold); color: var(--bg); }
  .hero-scroll {
    position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%);
    display: flex; flex-direction: column; align-items: center; gap: 8px;
    opacity: 0; animation: fadeIn 1s 1.4s forwards;
  }
  .hero-scroll span {
    font-family: 'Inter', sans-serif; font-size: 9px;
    letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim);
  }
  .scroll-line {
    width: 1px; height: 40px;
    background: linear-gradient(to bottom, var(--gdim), transparent);
    animation: sp 2s ease-in-out infinite;
  }
  @keyframes sp { 0%,100% { opacity: 0.4; } 50% { opacity: 1; } }
  @keyframes su { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  /* FEATURED STRIP */
  .featured-strip { padding: 80px 80px 100px; }
  .section-label {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 40px;
    display: flex; align-items: center; gap: 16px;
  }
  .section-label::after { content: ''; flex: 0 0 60px; height: 1px; background: var(--gdim); }
  .films-strip { display: grid; grid-template-columns: repeat(4, 1fr); gap: 2px; }

  /* FILM CARD — home page poster strip (portrait 2:3) */
  .film-card {
    cursor: pointer; position: relative;
    aspect-ratio: 2/3; overflow: hidden; background: var(--surface);
  }
  .film-card img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; transition: transform 0.6s ease;
  }
  .film-card:hover img { transform: scale(1.05); }
  .film-ph {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: 'Cormorant Garamond', serif; font-size: 36px;
    color: rgba(255,255,255,0.04); letter-spacing: 0.1em;
    transition: transform 0.6s ease;
  }
  .film-card:hover .film-ph { transform: scale(1.05); }
  .film-overlay {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,9,6,0.92) 0%, rgba(10,9,6,0.05) 60%);
    transition: opacity 0.3s;
  }
  .film-card:hover .film-overlay { opacity: 0.5; }
  .film-info { position: absolute; bottom: 0; left: 0; right: 0; padding: 20px 18px; }
  .film-info-title {
    font-family: 'Cormorant Garamond', serif; font-size: 17px;
    font-weight: 400; color: var(--white); letter-spacing: 0.05em;
  }
  .film-info-tag {
    font-family: 'Inter', sans-serif; font-size: 9px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); margin-top: 4px;
  }
  .film-bg-1 { background: linear-gradient(135deg, #2a1a0e, #1a0d08); }
  .film-bg-2 { background: linear-gradient(135deg, #0e1a1a, #080d0d); }
  .film-bg-3 { background: linear-gradient(135deg, #1a1508, #0d0e08); }
  .film-bg-4 { background: linear-gradient(135deg, #1a0e14, #0d080e); }
  .film-bg-5 { background: linear-gradient(135deg, #0e1518, #080d0f); }

  /* PAGE HEADER */
  .page-header { padding: 140px 80px 60px; border-bottom: 1px solid var(--border); }
  .page-header h1 {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(36px, 5vw, 58px);
    font-weight: 300; color: var(--white); letter-spacing: 0.02em;
  }

  /* FILMS GRID */
  .films-grid { padding: 60px 80px 100px; display: grid; grid-template-columns: repeat(3,1fr); gap: 40px 24px; }
  .film-gc { cursor: pointer; }
  .film-gc-thumb {
    aspect-ratio: 16/10; overflow: hidden; margin-bottom: 16px;
    position: relative; background: var(--surface);
  }
  .film-gc-thumb img { width: 100%; height: 100%; object-fit: cover; transition: transform 0.5s ease; }
  .film-gc:hover .film-gc-thumb img { transform: scale(1.05); }
  .film-gc-ph {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 26px;
    color: rgba(255,255,255,0.04); letter-spacing: 0.1em;
    transition: transform 0.5s ease;
  }
  .film-gc:hover .film-gc-ph { transform: scale(1.05); }
  .film-gc-title {
    font-family: 'Cormorant Garamond', serif; font-size: 20px;
    font-weight: 400; color: var(--white); letter-spacing: 0.05em; margin-bottom: 6px;
  }
  .film-gc-meta {
    font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 0.15em; text-transform: uppercase; color: var(--dim);
  }

  /* FILM DETAIL HERO */
  .fd-hero {
    position: relative; height: 70vh;
    display: flex; align-items: flex-end; padding-bottom: 60px; overflow: hidden;
  }
  .fd-bg { position: absolute; inset: 0; }
  .fd-bg img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.45); }
  .fd-bg-ph {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 80px; color: rgba(255,255,255,0.03);
  }
  .fd-grad {
    position: absolute; inset: 0;
    background: linear-gradient(to top, rgba(10,9,6,1) 0%, rgba(10,9,6,0.45) 55%, rgba(10,9,6,0.1) 100%);
  }
  .fd-content { position: relative; z-index: 2; padding: 0 80px; }
  .back-btn {
    display: inline-flex; align-items: center; gap: 8px;
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--dim); cursor: pointer;
    margin-bottom: 24px; transition: color 0.2s; background: none; border: none;
  }
  .back-btn::before { content: '←'; font-size: 14px; }
  .back-btn:hover { color: var(--gold); }
  .fd-title {
    font-family: 'Cormorant Garamond', serif; font-size: clamp(44px, 7vw, 88px);
    font-weight: 300; color: var(--white); letter-spacing: 0.01em;
    line-height: 1.1; margin-bottom: 16px;
  }
  .fd-logline { font-size: 20px; font-style: italic; color: var(--dim); max-width: 560px; margin-bottom: 28px; }
  .fd-actions { display: flex; gap: 16px; align-items: center; flex-wrap: wrap; }
  .btn-outline {
    display: inline-block; font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--dim);
    border: 1px solid var(--border); padding: 12px 22px; text-decoration: none;
  }
  .btn-primary {
    display: inline-block; font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 0.2em; text-transform: uppercase; color: var(--bg);
    background: var(--gold); border: none; padding: 14px 28px;
    cursor: pointer; transition: background 0.2s; text-decoration: none;
  }
  .btn-primary:hover { background: #d4a020; }
  .fd-grid {
    display: grid; grid-template-columns: 1fr 2fr; gap: 60px;
    padding: 60px 80px 100px; border-top: 1px solid var(--border);
  }
  .fd-credits { display: flex; flex-direction: column; gap: 24px; }
  .cr-label {
    font-family: 'Inter', sans-serif; font-size: 9px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 4px;
  }
  .cr-val { font-size: 18px; color: var(--text); }
  .fd-syn h3 {
    font-family: 'Cormorant Garamond', serif; font-size: 20px; font-weight: 400;
    color: var(--white); letter-spacing: 0.08em; margin-bottom: 18px;
  }
  .fd-syn p { font-size: 18px; font-weight: 300; color: var(--dim); line-height: 1.85; }
  .fest-list { margin-top: 36px; }
  .fest-list h4 {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.3em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 14px;
  }
  .fest-row {
    display: flex; align-items: baseline; gap: 12px;
    padding: 10px 0; border-bottom: 1px solid var(--border);
  }
  .fest-row:last-child { border-bottom: none; }
  .fest-dot { width: 4px; height: 4px; border-radius: 50%; background: var(--gold); flex-shrink: 0; margin-top: 6px; }
  .fest-name { font-size: 17px; color: var(--text); }
  .fest-award {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.15em;
    text-transform: uppercase; color: var(--gold); margin-left: auto; white-space: nowrap;
  }

  /* ABOUT */
  .about-wrap { padding: 60px 80px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
  .about-text h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400;
    color: var(--white); letter-spacing: 0.06em; line-height: 1.3; margin-bottom: 28px;
  }
  .about-text p { font-size: 18px; font-weight: 300; color: var(--dim); line-height: 1.9; margin-bottom: 18px; }
  .about-stats { display: flex; flex-direction: column; gap: 28px; padding-top: 12px; }
  .stat { border-top: 1px solid var(--border); padding-top: 22px; }
  .stat-n {
    font-family: 'Cormorant Garamond', serif; font-size: 52px; font-weight: 300;
    color: var(--white); line-height: 1; margin-bottom: 6px;
  }
  .stat-l { font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.25em; text-transform: uppercase; color: var(--dim); }
  .stat-note { font-size: 15px; font-style: italic; color: var(--dim); margin-top: 5px; }

  /* TEAM */
  .team-grid { padding: 60px 80px 60px; display: grid; grid-template-columns: repeat(5,1fr); gap: 32px 20px; }
  .team-photo {
    aspect-ratio: 3/4; overflow: hidden; position: relative;
    background: var(--surface); margin-bottom: 16px;
  }
  .team-photo img {
    width: 100%; height: 100%; object-fit: cover; object-position: top;
    transition: transform 0.5s ease;
  }
  .team-card:hover .team-photo img { transform: scale(1.03); }
  .team-ph {
    width: 100%; height: 100%; display: flex; align-items: center; justify-content: center;
    font-family: 'Cinzel', serif; font-size: 38px; color: rgba(255,255,255,0.06);
    transition: transform 0.5s ease;
  }
  .team-card:hover .team-ph { transform: scale(1.03); }
  .team-name {
    font-family: 'Cormorant Garamond', serif; font-size: 19px; font-weight: 400;
    color: var(--white); letter-spacing: 0.05em; margin-bottom: 4px;
  }
  .team-role {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 12px;
  }
  .team-bio {
    font-size: 15px; font-weight: 300; color: var(--dim); line-height: 1.7;
    display: -webkit-box; -webkit-line-clamp: 4; -webkit-box-orient: vertical;
    overflow: hidden; transition: all 0.4s ease;
  }
  .team-bio.expanded {
    display: block; -webkit-line-clamp: unset; overflow: visible;
  }
  .read-more-btn {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--gold); background: none; border: none;
    padding: 8px 0 0; cursor: pointer; transition: opacity 0.2s; display: block;
  }
  .read-more-btn:hover { opacity: 0.7; }
  .team-links { display: flex; gap: 16px; margin-top: 12px; flex-wrap: wrap; }
  .team-link {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim); text-decoration: none;
    border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: all 0.2s;
  }
  .team-link:hover { color: var(--gold); border-color: var(--gdim); }
  .co-box {
    margin: 0 80px 80px; padding: 44px; border: 1px solid var(--border); background: var(--surface);
    display: grid; grid-template-columns: auto 1fr; gap: 44px; align-items: start;
  }
  .co-label {
    writing-mode: vertical-rl; transform: rotate(180deg);
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold);
  }
  .co-box h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 30px; font-weight: 400;
    color: var(--white); letter-spacing: 0.06em; margin-bottom: 6px;
  }
  .co-box .est {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--dim); margin-bottom: 16px;
  }
  .co-box p { font-size: 18px; font-weight: 300; color: var(--dim); line-height: 1.8; max-width: 600px; }
  .soc-links { display: flex; gap: 20px; margin-top: 20px; flex-wrap: wrap; }
  .soc-link {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--dim); text-decoration: none;
    border-bottom: 1px solid var(--border); padding-bottom: 2px; transition: all 0.2s;
  }
  .soc-link:hover { color: var(--gold); border-color: var(--gdim); }

  /* CONTACT */
  .contact-wrap { padding: 60px 80px 100px; display: grid; grid-template-columns: 1fr 1fr; gap: 80px; }
  .contact-info h2 {
    font-family: 'Cormorant Garamond', serif; font-size: 34px; font-weight: 400;
    color: var(--white); letter-spacing: 0.06em; line-height: 1.3; margin-bottom: 24px;
  }
  .contact-info p { font-size: 18px; font-weight: 300; color: var(--dim); line-height: 1.9; margin-bottom: 28px; }
  .cd { margin-bottom: 20px; }
  .cd-label { font-family: 'Inter', sans-serif; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-bottom: 4px; }
  .cd-val { font-size: 18px; color: var(--text); }
  .cd-val a { color: var(--text); text-decoration: none; border-bottom: 1px solid var(--border); transition: all 0.2s; }
  .cd-val a:hover { color: var(--gold); border-color: var(--gdim); }
  .c-form { display: flex; flex-direction: column; gap: 20px; }
  .fg { display: flex; flex-direction: column; gap: 8px; }
  .fl { font-family: 'Inter', sans-serif; font-size: 9px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--dim); }
  .fi, .fta {
    background: var(--surface); border: 1px solid var(--border); color: var(--text);
    padding: 14px 16px; font-family: 'Cormorant Garamond', serif; font-size: 17px;
    outline: none; transition: border-color 0.2s; resize: vertical;
  }
  .fi:focus, .fta:focus { border-color: var(--gdim); }
  .fta { min-height: 140px; }
  .fsub {
    font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.25em;
    text-transform: uppercase; color: var(--bg); background: var(--gold);
    border: none; padding: 16px 32px; cursor: pointer;
    transition: background 0.2s; align-self: flex-start;
  }
  .fsub:hover { background: #d4a020; }
  .f-confirm { display: none; font-size: 16px; color: var(--gold); font-style: italic; }

  /* FOOTER */
  footer {
    border-top: 1px solid var(--border); padding: 32px 80px;
    display: flex; align-items: center; justify-content: space-between;
  }
  .ft-logo { font-family: 'Cormorant Garamond', serif; font-size: 16px; font-weight: 500; letter-spacing: 0.2em; color: var(--dim); }
  .ft-copy { font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.15em; color: var(--dim); }
  .ft-soc { display: flex; gap: 24px; }
  .ft-soc a {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim); text-decoration: none; transition: color 0.2s;
  }
  .ft-soc a:hover { color: var(--gold); }

  /* STILLS GRID */
  .stills-section {
    padding: 0 80px 64px;
    border-bottom: 1px solid var(--border);
  }
  .stills-label {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .stills-label::after { content: ''; flex: 0 0 48px; height: 1px; background: var(--gdim); }
  .stills-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 3px;
  }
  .still-thumb {
    aspect-ratio: 16/10; overflow: hidden; cursor: pointer;
    position: relative; background: var(--surface);
  }
  .still-thumb img {
    width: 100%; height: 100%; object-fit: cover;
    transition: transform 0.5s ease, filter 0.3s ease;
    filter: brightness(0.88);
  }
  .still-thumb:hover img { transform: scale(1.04); filter: brightness(1); }
  .still-thumb::after {
    content: '⤢';
    position: absolute; top: 10px; right: 12px;
    font-size: 14px; color: rgba(255,255,255,0);
    transition: color 0.25s; pointer-events: none;
  }
  .still-thumb:hover::after { color: rgba(255,255,255,0.6); }


  /* ── SCROLL REVEAL ─────────────────────────────────────────── */
  .reveal {
    opacity: 0; transform: translateY(60px);
    transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1),
                transform 0.9s cubic-bezier(0.16,1,0.3,1);
  }
  .reveal.visible { opacity: 1; transform: translateY(0); }
  .reveal-delay-1 { transition-delay: 0.1s; }
  .reveal-delay-2 { transition-delay: 0.25s; }
  .reveal-delay-3 { transition-delay: 0.4s; }
  .reveal-delay-4 { transition-delay: 0.55s; }

  /* ── HERO PARALLAX ──────────────────────────────────────────── */
  .hero-visual img { will-change: transform; }

  /* ── STATEMENT SECTION ──────────────────────────────────────── */
  .home-statement {
    padding: 140px 80px;
    border-top: 1px solid var(--border);
  }
  .home-statement-text {
    font-family: 'Cormorant Garamond', serif;
    font-size: clamp(30px, 3.5vw, 54px);
    font-weight: 300; line-height: 1.3; letter-spacing: 0.01em;
    color: var(--white); max-width: 820px;
  }
  .home-statement-text em {
    font-style: italic; color: var(--gold);
    font-family: 'Cormorant Garamond', serif; font-weight: 300;
  }
  .home-statement-sub {
    font-size: 18px; font-weight: 300; font-style: italic;
    color: var(--dim); margin-top: 32px; max-width: 540px; line-height: 1.8;
  }

  /* TRAILER LIGHTBOX */
  .trailer-overlay {

// ── FILMS ──────────────────────────────────────────────────────
function buildFilms() {

// ── FILM DETAIL ────────────────────────────────────────────────
function buildFilmDetail(slug) {
  const f = SITE.films.find(x => x.slug === slug);
  if (!f) return;
  const bgSrc = f.heroImage || f.thumb;
  const bgHtml = bgSrc
    ? `<img src="${bgSrc}" alt="${f.title}" />`
    : `<div class="fd-bg-ph ${f.bgClass}">${f.initials}</div>`;
  const trailer = f.trailerUrl
    ? `<button class="btn-primary" onclick="openTrailer('${f.trailerUrl}')">Watch Trailer</button>` : '';
  const credits = f.credits.map(c =>
    `<div><div class="cr-label">${c.label}</div><div class="cr-val">${c.value}</div></div>`).join('');
  const fests = f.festivals.length ? `
    <div class="fest-list"><h4>Featured Festivals</h4>
      ${f.festivals.map(x =>
        `<div class="fest-row"><div class="fest-dot"></div><div class="fest-name">${x.name}</div><div class="fest-award">${x.award}</div></div>`
      ).join('')}
    </div>` : '';

  // Stills grid — only rendered if film has stills
  const stills = (f.stills || []).filter(s => s && s.trim() !== '');
  const stillsSection = stills.length ? `
    <div class="stills-section">
      <p class="stills-label">Stills</p>
      <div class="stills-grid" id="stills-grid">
        ${stills.map((src, i) =>
          `<div class="still-thumb" data-index="${i}">
            <img src="${src}" alt="Still ${i + 1}" loading="lazy" />
          </div>`
        ).join('')}
      </div>
    </div>` : '';

  document.getElementById('page-film-detail').innerHTML = `
    <div class="fd-hero">
      <div class="fd-bg">${bgHtml}</div>
      <div class="fd-grad"></div>
      <div class="fd-content">
        <button class="back-btn" onclick="showPage('films')">All Films</button>
        <h1 class="fd-title">${f.title}</h1>
        <p class="fd-logline">${f.logline}</p>
        <div class="fd-actions">
          <span class="btn-outline">${f.status} · ${f.year}</span>${trailer}
        </div>
      </div>
    </div>
    ${stillsSection}
    <div class="fd-grid">
      <div class="fd-credits reveal">${credits}</div>
      <div class="fd-syn reveal reveal-delay-2"><h3>Synopsis</h3><p>${f.synopsis}</p>${fests}</div>
    </div>
    ${ft()}`;

  // Store stills and wire up clicks after DOM is ready
  currentStills = stills;
  if (stills.length) {
    document.getElementById('stills-grid').addEventListener('click', function(e) {
      const thumb = e.target.closest('.still-thumb');
      if (thumb) openLightbox(parseInt(thumb.getAttribute('data-index')));
    });
  }
}

// ── LIGHTBOX ───────────────────────────────────────────────────
let currentStills = [];
let currentStillIndex = 0;
let lbEl = null;

function buildLightboxEl() {
  if (document.getElementById('lb-overlay')) return;
  const div = document.createElement('div');
  div.id = 'lb-overlay';
  div.style.cssText = `
    display:none; position:fixed; inset:0; z-index:99999;
    background:rgba(5,4,3,0.97); align-items:center; justify-content:center;
    cursor:zoom-out;
  `;
  div.innerHTML = `
    <button id="lb-close" style="position:fixed;top:24px;right:28px;background:none;border:none;
      color:#8a8070;font-family:Inter,sans-serif;font-size:11px;letter-spacing:.2em;
      text-transform:uppercase;cursor:pointer;padding:8px;z-index:100000;">Close ✕</button>
    <button id="lb-prev" style="position:fixed;left:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:#8a8070;font-size:32px;cursor:pointer;
      padding:16px 20px;z-index:100000;user-select:none;">←</button>
    <div id="lb-wrap" style="max-width:92vw;max-height:88vh;display:flex;
      align-items:center;justify-content:center;cursor:default;">
      <img id="lb-img" src="" alt="Film still"
        style="max-width:92vw;max-height:88vh;object-fit:contain;
        box-shadow:0 0 80px rgba(0,0,0,0.9);" />
    </div>
    <button id="lb-next" style="position:fixed;right:12px;top:50%;transform:translateY(-50%);
      background:none;border:none;color:#8a8070;font-size:32px;cursor:pointer;
      padding:16px 20px;z-index:100000;user-select:none;">→</button>
    <div id="lb-counter" style="position:fixed;bottom:24px;left:50%;transform:translateX(-50%);
      font-family:Inter,sans-serif;font-size:11px;letter-spacing:.25em;color:#8a8070;
      z-index:100000;"></div>
  `;
  document.body.appendChild(div);
  lbEl = div;

  div.addEventListener('click', function(e) {
    if (e.target === div) closeLightbox();
  });
  document.getElementById('lb-close').addEventListener('click', closeLightbox);
  document.getElementById('lb-wrap').addEventListener('click', function(e) { e.stopPropagation(); });
  document.getElementById('lb-prev').addEventListener('click', function(e) { e.stopPropagation(); lbPrev(); });
  document.getElementById('lb-next').addEventListener('click', function(e) { e.stopPropagation(); lbNext(); });
}

function openLightbox(index) {
  buildLightboxEl();
  currentStillIndex = index;
  updateLightbox();
  lbEl = document.getElementById('lb-overlay');
  lbEl.style.display = 'flex';
  document.documentElement.style.overflow = 'hidden';
}

function closeLightbox() {
  const lb = document.getElementById('lb-overlay');
  if (lb) lb.style.display = 'none';
  document.documentElement.style.overflow = '';
}

function updateLightbox() {
  document.getElementById('lb-img').src = currentStills[currentStillIndex];
  document.getElementById('lb-counter').textContent = (currentStillIndex + 1) + ' / ' + currentStills.length;
  document.getElementById('lb-prev').style.visibility = currentStillIndex === 0 ? 'hidden' : 'visible';
  document.getElementById('lb-next').style.visibility = currentStillIndex === currentStills.length - 1 ? 'hidden' : 'visible';
}

function lbPrev() { if (currentStillIndex > 0) { currentStillIndex--; updateLightbox(); } }
function lbNext() { if (currentStillIndex < currentStills.length - 1) { currentStillIndex++; updateLightbox(); } }

document.addEventListener('keydown', function(e) {
  const lb = document.getElementById('lb-overlay');
  if (!lb || lb.style.display === 'none' || lb.style.display === '') return;
  if (e.key === 'ArrowLeft')  lbPrev();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'Escape')     closeLightbox();
});

function toggleBio(idx) {

  const btn = document.getElementById('rmb-' + idx);

// ── TRAILER LIGHTBOX ───────────────────────────────────────────
function openTrailer(url) {
  let embedUrl = url;
  const vimeoMatch = url.match(/vimeo\.com\/(\d+)/);
  if (vimeoMatch) embedUrl = `https://player.vimeo.com/video/${vimeoMatch[1]}?autoplay=1&color=b8860b&title=0&byline=0&portrait=0`;
  const ytMatch = url.match(/(?:youtu\.be\/|youtube\.com\/watch\?v=)([\w-]+)/);
  if (ytMatch) embedUrl = `https://www.youtube.com/embed/${ytMatch[1]}?autoplay=1`;

  let overlay = document.getElementById('trailer-overlay');
  if (!overlay) {
    overlay = document.createElement('div');
    overlay.id = 'trailer-overlay';
    overlay.className = 'trailer-overlay';
    overlay.innerHTML = `
      <button class="trailer-close" id="trailer-close">Close ✕</button>
      <div class="trailer-wrap" id="trailer-wrap">
        <iframe id="trailer-iframe" src="" allowfullscreen allow="autoplay"></iframe>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', function(e) { if (e.target === overlay) closeTrailer(); });
    document.getElementById('trailer-close').addEventListener('click', closeTrailer);
    document.getElementById('trailer-wrap').addEventListener('click', function(e) { e.stopPropagation(); });
  }

  document.getElementById('trailer-iframe').src = embedUrl;
  overlay.style.display = 'flex';
  document.documentElement.style.overflow = 'hidden';
}

function closeTrailer() {
  const overlay = document.getElementById('trailer-overlay');
  if (overlay) { overlay.style.display = 'none'; document.getElementById('trailer-iframe').src = ''; }
  document.documentElement.style.overflow = '';
}

document.addEventListener('keydown', function(e) { if (e.key === 'Escape') closeTrailer(); });

// ── SCROLL EFFECTS ─────────────────────────────────────────────
let revealObserver = null;

function initReveal() {
  if (revealObserver) revealObserver.disconnect();

  // Reset all reveals on the current page so they can re-animate
  document.querySelectorAll('.page.active .reveal').forEach(el => {
    el.classList.remove('visible');
  });

  revealObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        entry.target.classList.add('visible');
        revealObserver.unobserve(entry.target);
      }
    });
  }, {
    threshold: 0.18,
    rootMargin: '0px 0px -80px 0px'  // element must be 80px into viewport before triggering
  });

  document.querySelectorAll('.page.active .reveal').forEach(el => {
    revealObserver.observe(el);
  });
}

function initParallax() {
  const img = document.getElementById('hero-img');
  if (!img) return;
  let ticking = false;
  const onScroll = () => {
    if (!ticking) {
      requestAnimationFrame(() => {
        const y = window.scrollY;
        img.style.transform = `translateY(${y * 0.35}px) scale(1.05)`;
        ticking = false;
      });
      ticking = true;
    }
  };
  window.addEventListener('scroll', onScroll, { passive: true });
  // Store cleanup ref so we can remove it when navigating away
  window._parallaxCleanup = () => window.removeEventListener('scroll', onScroll);
}

// ── NAVIGATION ─────────────────────────────────────────────────
let menuOpen = false;

function closeMobileMenu() {
  document.getElementById('nav-links').classList.remove('open');
  menuOpen = false;
}

function toggleMobileMenu() {
  menuOpen = !menuOpen;
  document.getElementById('nav-links').classList.toggle('open', menuOpen);
}

function showPage(id, pushHistory = true) {
  closeMobileMenu();
  if (window._parallaxCleanup) { window._parallaxCleanup(); window._parallaxCleanup = null; }
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(initReveal, 100);
  if (pushHistory) {
    const state = { type: 'page', id };
    const url = id === 'home' ? '.' : '#' + id;
    history.pushState(state, '', url);
  }
}

function showFilm(slug, pushHistory = true) {
  buildFilmDetail(slug);
  closeMobileMenu();
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-film-detail').classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-films');
  if (el) el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
  setTimeout(initReveal, 100);
  if (pushHistory) {
    const state = { type: 'film', slug };
    history.pushState(state, '', '#film-' + slug);
  }
}

// Handle browser back/forward buttons
window.addEventListener('popstate', function(e) {
  if (!e.state) { showPage('home', false); return; }
  if (e.state.type === 'page') showPage(e.state.id, false);
  if (e.state.type === 'film') showFilm(e.state.slug, false);
});

async function submitForm() {
  const n = document.getElementById('cf-n')?.value.trim();
  const e = document.getElementById('cf-e')?.value.trim();
  const s = document.getElementById('cf-s')?.value.trim();
  const m = document.getElementById('cf-m')?.value.trim();

  if (!n || !e) { alert('Please enter your name and email.'); return; }

  const btn = document.querySelector('.fsub');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/xgonnbra', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name: n, email: e, subject: s, message: m }),
    });

    if (res.ok) {
      document.getElementById('f-confirm').style.display = 'block';
      btn.style.display = 'none';
      // Clear fields
      ['cf-n','cf-e','cf-s','cf-m'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    } else {
      btn.textContent = 'Send Message';
      btn.disabled = false;
      alert('Something went wrong. Please try emailing us directly at ' + SITE.contact.email);
    }
  } catch (err) {
    btn.textContent = 'Send Message';
    btn.disabled = false;
    alert('Could not send — please check your connection or email us directly at ' + SITE.contact.email);
  }
}

// Scroll shadow on nav
window.addEventListener('scroll', () => {
  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 60);
});

// Set nav logo — image if provided, otherwise text
const navLogo = document.querySelector('.nav-logo');
if (SITE.logo && SITE.logo.trim() !== '') {
  navLogo.innerHTML = `<img src="${SITE.logo}" alt="${SITE.company.name}" />`;
} else {
  navLogo.textContent = SITE.company.name.toUpperCase();
}

// Set "Get In Touch" link
document.getElementById('nav-cta').href = 'mailto:' + SITE.contact.email;

// ── INIT ───────────────────────────────────────────────────────
buildHome();
buildFilms();
buildAbout();
buildTeam();
buildContact();
// Set initial history entry then show home
history.replaceState({ type: 'page', id: 'home' }, '', '.');
showPage('home', false);
</script>
