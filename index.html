<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg:      #0a0906;
    --surface: #1a1710;
    --border:  rgba(255,255,255,0.07);
    --gold:    #c9a84c;
    --gdim:    #8a6e2f;
    --text:    #e8e0d0;
    --dim:     #8a8070;
    --white:   #f5f0e8;
  }
  html { scroll-behavior: smooth; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-size: 18px; line-height: 1.7; overflow-x: hidden;
  }
  body::before {
    content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 9999; opacity: 0.35;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 1000;
    display: flex; align-items: center; justify-content: space-between;
    padding: 0 48px; height: 70px;
    background: linear-gradient(to bottom, rgba(10,9,6,0.95), rgba(10,9,6,0));
    transition: background 0.4s;
  }
  nav.scrolled { background: rgba(10,9,6,0.97); border-bottom: 1px solid var(--border); }
  .nav-logo {
    font-family: 'Cinzel', serif; font-size: 15px; font-weight: 600;
    letter-spacing: 0.35em; color: var(--white); cursor: pointer;
    text-decoration: none; flex-shrink: 0; display: flex; align-items: center;
  }
  .nav-logo img { height: 56px; width: auto; display: block; /* ← adjust this number to resize the logo */ }
  .nav-links { display: flex; gap: 36px; list-style: none; }
  .nav-links a {
    font-family: 'Inter', sans-serif; font-size: 11px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim); text-decoration: none;
    cursor: pointer; transition: color 0.2s;
  }
  .nav-links a:hover, .nav-links a.active { color: var(--gold); }
  .nav-reel {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.2em;
    text-transform: uppercase; color: var(--dim); border: 1px solid var(--border);
    padding: 7px 16px; cursor: pointer; transition: all 0.2s;
    text-decoration: none; flex-shrink: 0;
  }
  .nav-reel:hover { color: var(--gold); border-color: var(--gdim); }
  .nav-hamburger {
    display: none; flex-direction: column; gap: 5px;
    cursor: pointer; padding: 4px; flex-shrink: 0;
  }
  .nav-hamburger span { display: block; width: 22px; height: 1px; background: var(--dim); transition: all 0.3s; }

  /* Mobile drawer */
  .nav-links.open {
    display: flex !important; flex-direction: column;
    position: fixed; top: 70px; left: 0; right: 0;
    background: rgba(10,9,6,0.98); padding: 28px 32px 36px;
    gap: 24px; border-bottom: 1px solid var(--border); z-index: 999;
  }
  .nav-links.open a { font-size: 15px; letter-spacing: 0.25em; }

  /* PAGES */
  .page { display: none; }
  .page.active { display: block; animation: fadeIn 0.4s ease; }
  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(10px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* HERO */
  .hero {
    position: relative; height: 100vh;
    display: flex; align-items: center; overflow: hidden;
  }
  .hero-visual { position: absolute; inset: 0; overflow: hidden; }
  .hero-visual img { width: 100%; height: 100%; object-fit: cover; filter: brightness(0.75); }
  .hero-fallback {
    width: 100%; height: 100%;
    background: radial-gradient(ellipse at 70% 50%, #3d2510, #1a0e06 40%, #0a0906);
  }
  .hero-fallback::after {
    content: ''; position: absolute; inset: 0;
    background: radial-gradient(circle at 72% 58%, rgba(180,100,30,0.2) 0%, transparent 45%),
                radial-gradient(circle at 68% 40%, rgba(220,140,40,0.1) 0%, transparent 30%);
  }
  .hero-grad {
    position: absolute; inset: 0;
    background: linear-gradient(110deg, rgba(10,9,6,0.65) 35%, rgba(10,9,6,0.05) 100%),
                linear-gradient(to bottom, rgba(10,9,6,0.05) 0%, rgba(10,9,6,0.55) 100%);
  }
  .hero-content { position: relative; z-index: 2; padding: 0 80px; max-width: 640px; }
  .hero-eyebrow {
    font-family: 'Inter', sans-serif; font-size: 10px; letter-spacing: 0.35em;
    text-transform: uppercase; color: var(--gold); margin-bottom: 24px;
    opacity: 0; animation: su 0.8s 0.3s forwards;
  }
  .hero-title {
    font-family: 'Cinzel', serif; font-size: clamp(36px, 5vw, 62px);
    font-weight: 400; line-height: 1.15; letter-spacing: 0.04em; color: var(--white);
    margin-bottom: 20px; opacity: 0; animation: su 0.8s 0.5s forwards;
  }
  .hero-sub {
    font-size: 19px; font-weight: 300; font-style: italic; color: var(--dim);
    margin-bottom: 44px; opacity: 0; animation: su 0.8s 0.7s forwards;
  }
  .hero-cta {
    display: inline-block; font-family: 'Inter', sans-serif; font-size: 11px;
    letter-spacing: 0.25em; text-transform: uppercase; color: var(--white);
    border: 1px solid rgba(255,255,255,0.3); padding: 14px 32px;
    cursor: pointer; text-decoration: none; transition: all 0.3s;

<script>
// ── HELPERS ────────────────────────────────────────────────────
function ft() {
  const yr = new Date().getFullYear();
  const s = [];
  if (SITE.contact.instagram) s.push(`<a href="${SITE.contact.instagram}" target="_blank">Instagram</a>`);
  if (SITE.contact.twitter)   s.push(`<a href="${SITE.contact.twitter}"   target="_blank">Twitter</a>`);
  if (SITE.contact.facebook)  s.push(`<a href="${SITE.contact.facebook}"  target="_blank">Facebook</a>`);
  if (SITE.contact.email)     s.push(`<a href="mailto:${SITE.contact.email}">Email</a>`);
  return `<footer>
    <div class="ft-logo">${SITE.company.name.toUpperCase()}</div>
    <div class="ft-copy">© ${yr} ${SITE.company.name}.</div>
    <div class="ft-soc">${s.join('')}</div>
  </footer>`;
}

// ── HOME ───────────────────────────────────────────────────────
function buildHome() {
  const heroVis = SITE.heroImage
    ? `<div class="hero-visual"><img src="${SITE.heroImage}" alt="" /></div>`
    : `<div class="hero-visual"><div class="hero-fallback"></div></div>`;
  const strip = SITE.films.slice(0, 4).map(f => `
    <div class="film-card" onclick="showFilm('${f.slug}')">
      ${f.poster ? `<img src="${f.poster}" alt="${f.title}" />` : `<div class="film-ph ${f.bgClass}">${f.initials}</div>`}
      <div class="film-overlay"></div>
      <div class="film-info">
        <div class="film-info-title">${f.title}</div>
        <div class="film-info-tag">${f.format} · ${f.status}</div>
      </div>
    </div>`).join('');
  document.getElementById('page-home').innerHTML = `
    <section class="hero">
      ${heroVis}<div class="hero-grad"></div>
      <div class="hero-content">
        <p class="hero-eyebrow">${SITE.company.location} · ${SITE.company.founded}</p>
        <h1 class="hero-title">${SITE.company.tagline}</h1>
        <p class="hero-sub">${SITE.company.sub}</p>
        <a class="hero-cta" onclick="showPage('films')">View Our Films</a>
      </div>
      <div class="hero-scroll"><div class="scroll-line"></div><span>Scroll</span></div>
    </section>
    <section class="featured-strip">
      <p class="section-label">Featured Films</p>
      <div class="films-strip">${strip}</div>
    </section>
    ${ft()}`;
}

// ── FILMS ──────────────────────────────────────────────────────
function buildFilms() {
  const cards = SITE.films.map(f => {
    const top = f.festivals[0] ? ` · ${f.festivals[0].award}` : '';
    return `<div class="film-gc" onclick="showFilm('${f.slug}')">
      <div class="film-gc-thumb">
        ${f.thumb ? `<img src="${f.thumb}" alt="${f.title}" />` : `<div class="film-gc-ph ${f.bgClass}">${f.initials}</div>`}
      </div>
      <div class="film-gc-title">${f.title}</div>
      <div class="film-gc-meta">${f.format} · ${f.status} · ${f.year}${top}</div>
    </div>`;
  }).join('');
  document.getElementById('page-films').innerHTML = `
    <div class="page-header"><p class="section-label">Our Work</p><h1>Films</h1></div>
    <div class="films-grid">${cards}</div>
    ${ft()}`;
}

// ── FILM DETAIL ────────────────────────────────────────────────
function buildFilmDetail(slug) {
  const f = SITE.films.find(x => x.slug === slug);
  if (!f) return;
  const bgSrc = f.heroImage || f.thumb;
  const bgHtml = bgSrc
    ? `<img src="${bgSrc}" alt="${f.title}" />`
    : `<div class="fd-bg-ph ${f.bgClass}">${f.initials}</div>`;
  const trailer = f.trailerUrl
    ? `<a class="btn-primary" href="${f.trailerUrl}" target="_blank">Watch Trailer</a>` : '';
  const credits = f.credits.map(c =>
    `<div><div class="cr-label">${c.label}</div><div class="cr-val">${c.value}</div></div>`).join('');
  const fests = f.festivals.length ? `
    <div class="fest-list"><h4>Festival Circuit</h4>
      ${f.festivals.map(x =>
        `<div class="fest-row"><div class="fest-dot"></div><div class="fest-name">${x.name}</div><div class="fest-award">${x.award}</div></div>`
      ).join('')}
    </div>` : '';

  // Stills grid — only rendered if film has stills
  const stills = (f.stills || []).filter(s => s && s.trim() !== '');
  const stillsSection = stills.length ? `
    <div class="stills-section">
      <p class="stills-label">Stills</p>
      <div class="stills-grid">
        ${stills.map((src, i) =>
          `<div class="still-thumb" onclick="openLightbox(${i})" title="Click to enlarge">
            <img src="${src}" alt="Still ${i + 1}" loading="lazy" />
          </div>`
        ).join('')}
      </div>
    </div>` : '';

  document.getElementById('page-film-detail').innerHTML = `
    <div class="fd-hero">
      <div class="fd-bg">${bgHtml}</div>
      <div class="fd-grad"></div>
      <div class="fd-content">
        <button class="back-btn" onclick="showPage('films')">All Films</button>
        <h1 class="fd-title">${f.title}</h1>
        <p class="fd-logline">${f.logline}</p>
        <div class="fd-actions">
          <span class="btn-outline">${f.status} · ${f.year}</span>${trailer}
        </div>
      </div>
    </div>
    ${stillsSection}
    <div class="fd-grid">
      <div class="fd-credits">${credits}</div>
      <div class="fd-syn"><h3>Synopsis</h3><p>${f.synopsis}</p>${fests}</div>
    </div>
    ${ft()}`;

  // Store stills list for lightbox navigation
  currentStills = stills;
}

// ── LIGHTBOX ───────────────────────────────────────────────────
let currentStills = [];
let currentStillIndex = 0;

function openLightbox(index) {
  currentStillIndex = index;
  updateLightbox();
  const lb = document.getElementById('lightbox');
  lb.style.display = 'flex';
  lb.style.zIndex = '10000';
  document.documentElement.style.overflow = 'hidden';
}

function closeLightbox() {
  document.getElementById('lightbox').style.display = 'none';
  document.documentElement.style.overflow = '';
}

function updateLightbox() {
  const img = document.getElementById('lb-img');
  img.src = currentStills[currentStillIndex];
  document.getElementById('lb-counter').textContent =
    (currentStillIndex + 1) + ' / ' + currentStills.length;
  document.getElementById('lb-prev').style.visibility = currentStillIndex === 0 ? 'hidden' : 'visible';
  document.getElementById('lb-next').style.visibility = currentStillIndex === currentStills.length - 1 ? 'hidden' : 'visible';
}

function lbPrev() { if (currentStillIndex > 0) { currentStillIndex--; updateLightbox(); } }
function lbNext() { if (currentStillIndex < currentStills.length - 1) { currentStillIndex++; updateLightbox(); } }

// Keyboard navigation
document.addEventListener('keydown', e => {
  const lb = document.getElementById('lightbox');
  if (!lb || lb.style.display === 'none' || lb.style.display === '') return;
  if (e.key === 'ArrowLeft')  lbPrev();
  if (e.key === 'ArrowRight') lbNext();
  if (e.key === 'Escape')     closeLightbox();
});

// ── ABOUT ──────────────────────────────────────────────────────
function buildAbout() {
  const paras = SITE.company.about.split('\n\n').filter(Boolean)
    .map(p => `<p>${p.trim()}</p>`).join('');
  const stats = SITE.stats.map(s =>
    `<div class="stat">
      <div class="stat-n">${s.number}</div>
      <div class="stat-l">${s.label}</div>
      <div class="stat-note">${s.note}</div>
    </div>`).join('');
  document.getElementById('page-about').innerHTML = `
    <div class="page-header"><p class="section-label">Our Story</p><h1>About</h1></div>
    <div class="about-wrap">
      <div class="about-text">
        <h2>An independent studio built on visual storytelling.</h2>${paras}
      </div>
      <div class="about-stats">${stats}</div>
    </div>
    ${ft()}`;
}

// ── TEAM ───────────────────────────────────────────────────────
function buildTeam() {
  const cards = SITE.team.map(m => {
    const photo = m.photo
      ? `<img src="${m.photo}" alt="${m.name}" />`
      : `<div class="team-ph ${m.bgClass}">${m.initials}</div>`;
    const links = [];
    if (m.website) links.push(`<a class="team-link" href="${m.website}" target="_blank">${m.websiteLabel || 'Website'}</a>`);
    if (m.extra)   links.push(`<a class="team-link" href="${m.extra}"   target="_blank">${m.extraLabel  || 'More'}</a>`);
    return `<div class="team-card">
      <div class="team-photo">${photo}</div>
      <div class="team-name">${m.name}</div>
      <div class="team-role">${m.role}</div>
      <p class="team-bio">${m.bio}</p>
      ${links.length ? `<div class="team-links">${links.join('')}</div>` : ''}
    </div>`;
  }).join('');
  const socs = [];
  if (SITE.contact.instagram) socs.push(`<a class="soc-link" href="${SITE.contact.instagram}" target="_blank">Instagram</a>`);
  if (SITE.contact.twitter)   socs.push(`<a class="soc-link" href="${SITE.contact.twitter}"   target="_blank">Twitter</a>`);
  if (SITE.contact.email)     socs.push(`<a class="soc-link" href="mailto:${SITE.contact.email}">Email</a>`);
  document.getElementById('page-team').innerHTML = `
    <div class="page-header"><p class="section-label">The People</p><h1>Our Team</h1></div>
    <div class="team-grid">${cards}</div>
    <div class="co-box">
      <div class="co-label">About</div>
      <div>
        <h2>${SITE.company.name}</h2>
        <p class="est">${SITE.company.location} · ${SITE.company.founded}</p>
        <p>${SITE.company.about.split('\n\n')[0]}</p>
        <div class="soc-links">${socs.join('')}</div>
      </div>
    </div>
    ${ft()}`;
}

// ── CONTACT ────────────────────────────────────────────────────
function buildContact() {
  const details = [];
  if (SITE.contact.email)
    details.push({ l: 'General Inquiries', v: `<a href="mailto:${SITE.contact.email}">${SITE.contact.email}</a>` });
  SITE.team.filter(m => m.website).forEach(m => {
    const roleShort = m.role.split(' · ').slice(1).join(' · ') || m.role;
    details.push({ l: roleShort + ' — ' + m.name, v: `<a href="${m.website}" target="_blank">${m.website.replace('https://','')}</a>` });
  });
  details.push({ l: 'Location', v: SITE.company.location });
  const dHtml = details.map(d =>
    `<div class="cd"><div class="cd-label">${d.l}</div><div class="cd-val">${d.v}</div></div>`).join('');
  document.getElementById('page-contact').innerHTML = `
    <div class="page-header"><p class="section-label">Reach Us</p><h1>Contact</h1></div>
    <div class="contact-wrap">
      <div class="contact-info">
        <h2>Let's make something together.</h2>
        <p>Whether you're a filmmaker, collaborator, festival programmer, or someone with a story worth telling — we'd love to hear from you.</p>
        ${dHtml}
      </div>
      <div class="c-form">
        <div class="fg"><label class="fl">Your Name</label><input class="fi" id="cf-n" type="text" placeholder="Jane Smith" /></div>
        <div class="fg"><label class="fl">Email</label><input class="fi" id="cf-e" type="email" placeholder="jane@example.com" /></div>
        <div class="fg"><label class="fl">Subject</label><input class="fi" id="cf-s" type="text" placeholder="Collaboration · Festival Submission · General" /></div>
        <div class="fg"><label class="fl">Message</label><textarea class="fta" id="cf-m" placeholder="Tell us about your project or inquiry…"></textarea></div>
        <button class="fsub" onclick="submitForm()">Send Message</button>
        <p class="f-confirm" id="f-confirm">Thank you — we'll be in touch soon.</p>
      </div>
    </div>
    ${ft()}`;
}

// ── NAVIGATION ─────────────────────────────────────────────────
let menuOpen = false;

function closeMobileMenu() {
  document.getElementById('nav-links').classList.remove('open');
  menuOpen = false;
}

function toggleMobileMenu() {
  menuOpen = !menuOpen;
  document.getElementById('nav-links').classList.toggle('open', menuOpen);
}

function showPage(id) {
  closeMobileMenu();   // ← BUG FIX: always close menu when navigating
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-' + id);
  if (el) el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

function showFilm(slug) {
  buildFilmDetail(slug);
  closeMobileMenu();   // ← BUG FIX: close menu when opening film
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.getElementById('page-film-detail').classList.add('active');
  document.querySelectorAll('.nav-links a').forEach(a => a.classList.remove('active'));
  const el = document.getElementById('nav-films');
  if (el) el.classList.add('active');
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

async function submitForm() {
  const n = document.getElementById('cf-n')?.value.trim();
  const e = document.getElementById('cf-e')?.value.trim();
  const s = document.getElementById('cf-s')?.value.trim();
  const m = document.getElementById('cf-m')?.value.trim();

  if (!n || !e) { alert('Please enter your name and email.'); return; }

  const btn = document.querySelector('.fsub');
  btn.textContent = 'Sending…';
  btn.disabled = true;

  try {
    const res = await fetch('https://formspree.io/f/xgonnbra', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json', 'Accept': 'application/json' },
      body: JSON.stringify({ name: n, email: e, subject: s, message: m }),
    });

    if (res.ok) {
      document.getElementById('f-confirm').style.display = 'block';
      btn.style.display = 'none';
      // Clear fields
      ['cf-n','cf-e','cf-s','cf-m'].forEach(id => {
        const el = document.getElementById(id);
        if (el) el.value = '';
      });
    } else {
      btn.textContent = 'Send Message';
      btn.disabled = false;
      alert('Something went wrong. Please try emailing us directly at ' + SITE.contact.email);
    }
  } catch (err) {
    btn.textContent = 'Send Message';
    btn.disabled = false;
    alert('Could not send — please check your connection or email us directly at ' + SITE.contact.email);
  }
}

// Scroll shadow on nav
window.addEventListener('scroll', () => {
  document.getElementById('main-nav').classList.toggle('scrolled', window.scrollY > 60);
});

// Set nav logo — image if provided, otherwise text
const navLogo = document.querySelector('.nav-logo');
if (SITE.logo && SITE.logo.trim() !== '') {
  navLogo.innerHTML = `<img src="${SITE.logo}" alt="${SITE.company.name}" />`;
} else {
  navLogo.textContent = SITE.company.name.toUpperCase();
}

// Set "Get In Touch" link
document.getElementById('nav-cta').href = 'mailto:' + SITE.contact.email;

// ── INIT ───────────────────────────────────────────────────────
buildHome();
buildFilms();
buildAbout();
buildTeam();
buildContact();
showPage('home');
</script>

  <div class="lb-img-wrap" onclick="event.stopPropagation()">
    <img id="lb-img" src="" alt="Film still" />
  </div>
  <button class="lb-arrow lb-next" onclick="event.stopPropagation(); lbNext()">&#8594;</button>
  <div class="lb-counter" id="lb-counter"></div>
</div>
